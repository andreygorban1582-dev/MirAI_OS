# PostgreSQL tuned for large-context storage.
# Default values are conservative (suitable for a 16-32 GB RAM machine).
# For a 128 GB RAM setup uncomment the larger values below and comment out
# the default lines (shared_buffers = 4GB, effective_cache_size = 12GB, etc.).
#
#   shared_buffers         = 32GB
#   effective_cache_size   = 96GB
#   maintenance_work_mem   = 4GB
#   work_mem               = 512MB

max_connections = 500
shared_buffers = 4GB
effective_cache_size = 12GB
maintenance_work_mem = 1GB
checkpoint_completion_target = 0.9
wal_buffers = 64MB
default_statistics_target = 500
random_page_cost = 1.1
effective_io_concurrency = 200
work_mem = 64MB
min_wal_size = 2GB
max_wal_size = 8GB
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4
