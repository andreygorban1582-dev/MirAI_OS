# ─── MirAI_OS  –  Nginx Reverse Proxy / Security Gateway ────────────────────
# All services proxied under HTTPS; HTTP redirects to HTTPS.

worker_processes auto;
events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 500M;

    # ── Rate limiting ──────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=chat:10m rate=120r/m;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream agentverse  { server agentverse:3000; }
    upstream n8n         { server n8n:5678; }
    upstream flowise     { server flowise:3001; }
    upstream orchestrator { server orchestrator:8080; }
    upstream langchain   { server langchain:8100; }
    upstream whisper     { server whisper:8400; }
    upstream csm         { server csm:8300; }
    upstream chromadb    { server chromadb:8000; }
    upstream pc_control  { server pc_control:8500; }
    upstream robin       { server robin:8600; }
    upstream openclaw    { server openclaw:8200; }
    upstream d_storage   { server d_drive_storage:9001; }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/mirai.crt;
        ssl_certificate_key /etc/nginx/ssl/mirai.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options          SAMEORIGIN;
        add_header X-Content-Type-Options   nosniff;
        add_header X-XSS-Protection         "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
        add_header Referrer-Policy          strict-origin-when-cross-origin;

        # ── Agentverse (Next.js UI) ────────────────────────────────────────
        location / {
            proxy_pass http://agentverse;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Orchestrator API + WebSocket ───────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://orchestrator/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # ── N8n ────────────────────────────────────────────────────────────
        location /n8n/ {
            proxy_pass http://n8n/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # ── Flowise ───────────────────────────────────────────────────────
        location /flowise/ {
            proxy_pass http://flowise/;
            proxy_set_header Host $host;
        }

        # ── LangChain ─────────────────────────────────────────────────────
        location /langchain/ {
            limit_req zone=chat burst=20 nodelay;
            proxy_pass http://langchain/;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # ── Whisper STT ───────────────────────────────────────────────────
        location /whisper/ {
            proxy_pass http://whisper/;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
            client_max_body_size 50M;
        }

        # ── CSM TTS ───────────────────────────────────────────────────────
        location /csm/ {
            proxy_pass http://csm/;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # ── PC Control (localhost-only) ────────────────────────────────────
        location /pc/ {
            allow 127.0.0.1;
            allow 172.20.0.0/16;
            deny  all;
            proxy_pass http://pc_control/;
            proxy_set_header Host $host;
        }

        # ── Robin / Tor ───────────────────────────────────────────────────
        location /robin/ {
            allow 172.20.0.0/16;
            deny  all;
            proxy_pass http://robin/;
            proxy_set_header Host $host;
        }

        # ── D-Drive storage console ───────────────────────────────────────
        location /storage/ {
            proxy_pass http://d_storage/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
